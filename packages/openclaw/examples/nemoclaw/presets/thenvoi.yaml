# SPDX-License-Identifier: Apache-2.0
preset:
  name: thenvoi
  description: "Thenvoi platform REST API and Phoenix Channels WebSocket access"

network_policies:
  thenvoi:
    name: thenvoi
    endpoints:
      - host: app.thenvoi.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET,    path: "/api/**" }
          - allow: { method: POST,   path: "/api/**" }
          - allow: { method: PATCH,  path: "/api/**" }
          - allow: { method: DELETE, path: "/api/**" }
      - host: app.thenvoi.com
        port: 443
        access: full
        tls: skip
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
